name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  # Force Rust to backtrace on panics during tests
  RUST_BACKTRACE: 1

jobs:
  supply_chain_audit:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    # Fails on any known RUSTSEC vulnerability in Cargo.lock. Unmaintained-crate
    # advisories surface as warnings; any ignore must live in audit.toml with a
    # written justification, never a blanket allow.
    - name: Install cargo-audit
      uses: taiki-e/install-action@v2
      with:
        tool: cargo-audit

    - name: Audit dependency advisories
      run: cargo audit

  wasm_ffi_check:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    - name: Setup Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: "secs-magik-wasm"

    # The wasm/uniffi FFI surface is the only consumer of the uniffi
    # dependency and is invisible to host builds (ffi.rs is wasm32-gated).
    # Without this lane, uniffi/wasm breakage has no CI signal: the 0.28 bump
    # broke setup_scaffolding placement silently, and the Dependabot 0.31 bump
    # was all-green while failing to compile on wasm32 (#111).
    - name: Install wasm32 target
      run: rustup target add wasm32-unknown-unknown

    - name: Check wasm32 + uniffi FFI surface
      run: cargo check -p libsec-core --target wasm32-unknown-unknown --features uniffi

  build_and_test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6

    # 0. Initialize Rust Cache
    # This action automatically caches ~/.cargo/registry, ~/.cargo/git, and target/
    - name: Setup Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        # Group the cache across all Rust workspace jobs sharing this key prefix
        shared-key: "secs-magik"

    # 1. Enforce Formatting
    - name: Check Formatting
      run: cargo fmt --all -- --check

    # 2. Enforce Zero Warnings (Clippy)
    - name: Run Clippy
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings

    # 3. Build Everything (including tests and benchmarks without running them)
    - name: Build All Targets
      run: cargo build --workspace --all-targets --all-features --verbose

    # 4. Execute the Hardened Test Suite
    - name: Run Tests
      run: cargo test --workspace --all-targets --all-features --verbose
